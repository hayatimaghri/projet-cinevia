<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinévia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <h1 class="logo">🎬 Cinévia</h1>
            <ul class="menu">
                <li><a href="# accueil">Accueil</a></li>
                <li><a href="# films">Films</a></li> 
                <li><a href="# favoris">Favoris</a></li> 
            </ul>
              <input type="text" placeholder="Rechercher...">
        </nav>
    </header>
    <main>
     <section id="accueil" class="hero">
        <div class="hero-left">
            <img src="image/cinéma.jpg" alt="cinema">
        </div>
<div class="hero-right">
            <h2>Découvrez les meilleurs films 🍿</h2>
            <p>Explorez, recherchez et regardez vos films préférés</p>
            <button>Explorer maintenant</button>
        </div>
    </section>
    <section class="filters">
        <button onclick="filterMovies('Tous')">Tous</button>
        <button onclick="filterMovies('Action')">Action</button>
        <button onclick="filterMovies('Comedy')">Comédie</button>
        <button onclick="filterMovies('Drama')">Drame</button>
    </section>
     <section id="films" class="films">
    <h2>Films populaires</h2>
    </section>
     <div class="films-grid" id="films-container"></div>
<section id="favoris" class="favorites">
    <h2>Mes Favoris ❤️</h2>
 <div class="films-grid">
        <div id="favoris-container"></div>
    </div>
</section>
<div id="modal" class="modal">
  <div class="modal-content">
    <span id="close">&times;</span>
    
    <img id="modal-img" src="" alt="">
    <h2 id="modal-title"></h2>
    <p id="modal-category"></p>
    <p id="modal-description"></p> 
     <button class="fav-btn">❤ Ajouter aux favoris</button>

  </div>
</div>
<footer>
    <p>© 2025 Cinévia - Tous droits réservés</p>
</footer>
</main>
 <script src="script.js"></script>
</body>
</html>
